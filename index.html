      "alternateName": "Nimart Nigeria",

      "sameAs": [
        "https://facebook.com/nimartng",

        "@type": "PostalAddress",
        "addressLocality": "Abuja",
        "addressCountry": "NG"
      },
      "contactPoint": {

        "telephone": "+23438887589",
        "contactType": "customer service",
        "email": "support@nimart.ng"
      }
